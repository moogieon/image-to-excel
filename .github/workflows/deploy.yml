name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PUBLIC_FIREBASE_PROJECT_ID }}
          PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          PUBLIC_FIREBASE_APP_ID: ${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          SA_CLIENT_EMAIL: ${{ secrets.FIREBASE_SA_CLIENT_EMAIL }}
          SA_PRIVATE_KEY: ${{ secrets.FIREBASE_SA_PRIVATE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - run: npm install -g firebase-tools

      - name: Create runtime .env for Cloud Functions
        run: |
          echo "SA_CLIENT_EMAIL=${{ secrets.FIREBASE_SA_CLIENT_EMAIL }}" >> .env
          echo "SA_PRIVATE_KEY=${{ secrets.FIREBASE_SA_PRIVATE_KEY }}" >> .env

      - name: Migrate Data Connect schema
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json
          firebase dataconnect:sql:migrate --project image-to-excel-628ee --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json

      - name: Deploy to Firebase
        run: firebase deploy --project image-to-excel-628ee --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
